name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for leaked secrets in frontend
        run: |
          if grep -r 'BETTER_AUTH_SECRET\|RESEND_API_KEY\|STRIPE_SECRET_KEY\|STRIPE_WEBHOOK_SECRET\|GOOGLE_CLIENT_SECRET' apps/web/src/ packages/; then
            echo "::error::Secrets found in frontend or shared packages!"
            exit 1
          fi

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Verify migrations are up to date
        run: |
          cd packages/db
          npx drizzle-kit generate 2>&1 | tee /tmp/drizzle-output.txt
          if grep -q "Your SQL migration file" /tmp/drizzle-output.txt; then
            echo "::error::Schema has changed but no migration was generated. Run 'pnpm db:generate' and commit the migration."
            exit 1
          fi
          echo "✓ Migrations are up to date"

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: toko
          POSTGRES_PASSWORD: toko_ci
          POSTGRES_DB: toko
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://toko:toko_ci@localhost:5432/toko
      BETTER_AUTH_SECRET: ci-test-secret-at-least-32-characters-long
      BETTER_AUTH_URL: http://localhost:3001
      CORS_ORIGIN: http://localhost:5176
      GOOGLE_CLIENT_ID: ci-placeholder
      GOOGLE_CLIENT_SECRET: ci-placeholder
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      STRIPE_PRICE_ID: price_placeholder

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Seed demo data
        run: pnpm --filter @focusflow/api db:seed

      - name: Run E2E tests
        run: pnpm test:e2e --project=chromium

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
