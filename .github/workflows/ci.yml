name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for leaked secrets in frontend
        run: |
          if grep -r 'BETTER_AUTH_SECRET\|RESEND_API_KEY\|STRIPE_SECRET_KEY\|STRIPE_WEBHOOK_SECRET\|GOOGLE_CLIENT_SECRET' apps/web/src/ packages/; then
            echo "::error::Secrets found in frontend or shared packages!"
            exit 1
          fi

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Verify migrations are up to date
        run: |
          cd packages/db
          npx drizzle-kit generate 2>&1 | tee /tmp/drizzle-output.txt
          if grep -q "Your SQL migration file" /tmp/drizzle-output.txt; then
            echo "::error::Schema has changed but no migration was generated. Run 'pnpm db:generate' and commit the migration."
            exit 1
          fi
          echo "✓ Migrations are up to date"
